<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --bot-bubble: #ffffff;
      --user-bubble: #1a56db;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #1a56db;
      --primary-light: #eff6ff;
      --header-bg: #1e293b;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .eyebrow {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .chat-window {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    /* Header */
    .chat-header {
      background: var(--header-bg);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bot-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .bot-info h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      color: #f1f5f9;
    }

    .bot-info p {
      font-size: 0.75rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-dot {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
    }

    /* Suggested questions */
    .suggestions {
      padding: 12px 16px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .suggestion-chip:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 85%;
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    .msg.bot .msg-avatar { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    .msg.user .msg-avatar { background: var(--primary); color: #fff; font-size: 11px; font-weight: 600; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .timestamp {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      text-align: right;
    }

    .msg.bot .timestamp { text-align: left; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .typing span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input */
    .chat-input {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      background: var(--bg);
    }

    .chat-input input:focus { border-color: var(--primary); }
    .chat-input input::placeholder { color: #9ca3af; }

    .send-btn {
      width: 40px; height: 40px;
      background: var(--primary);
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn svg { width: 16px; height: 16px; }

    .confidence {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

<p class="eyebrow">AI Internship — Task 2</p>

<div class="chat-window">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <h2>CodeAlpha Assistant</h2>
      <p><span class="online-dot"></span> Online — FAQ Bot</p>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion-chip" onclick="askSuggestion(this)">What is CodeAlpha?</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">How to apply?</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Is it paid?</button>
    <button class="suggestion-chip" onclick="askSuggestion(this)">Certificate?</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') sendMessage()"/>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // FAQ Database
  const faqs = [
    { q: "what is codealpha", a: "CodeAlpha is a leading software development company offering internship programs in AI, web development, app development, and more. It helps students gain real-world experience." },
    { q: "how to apply for internship", a: "You can apply for the CodeAlpha internship through their official website www.codealpha.tech or via their WhatsApp group. Fill out the application form to get started." },
    { q: "is the internship paid", a: "The CodeAlpha internship is unpaid, but you receive a completion certificate, offer letter, letter of recommendation, and placement support upon successful completion." },
    { q: "what certificate will i get", a: "Upon completing the internship, you'll receive a QR-verified Completion Certificate, an Internship Offer Letter, and a Unique ID Certificate. A Letter of Recommendation may also be provided based on performance." },
    { q: "how many tasks do i need to complete", a: "You need to complete a minimum of 2 or 3 tasks out of 4 to be eligible for the internship certificate. Submitting only 1 task will be considered incomplete." },
    { q: "how to submit the tasks", a: "Submit your completed tasks through the Submission Form shared in your WhatsApp group. Upload your code to GitHub and post a video explanation on LinkedIn tagging @CodeAlpha." },
    { q: "what is the duration of internship", a: "The internship duration is typically 1 month. You need to complete and submit your tasks within the mentioned time frame." },
    { q: "how to upload code to github", a: "Create a new GitHub repository named CodeAlpha_ProjectName, upload your project files, and share the repository link in your submission form." },
    { q: "what technologies are used", a: "Depending on your domain — App Development uses HTML, CSS, JavaScript. AI track uses Python, NLP libraries like NLTK/SpaCy, TensorFlow/Keras, and OpenCV." },
    { q: "contact codealpha", a: "You can contact CodeAlpha via: Website: www.codealpha.tech | WhatsApp: +91 9336576683 | Email: services@codealpha.tech" },
    { q: "what is letter of recommendation", a: "A Letter of Recommendation (LOR) is provided based on your performance during the internship. It highlights your skills and contributions and is useful for future job applications." },
    { q: "do i need to post on linkedin", a: "Yes! You are required to share your internship status on LinkedIn tagging @CodeAlpha, and post a video explanation of each completed project with the GitHub repository link." },
    { q: "what happens if i submit one task", a: "Submitting only one task is considered incomplete. You will not receive a certificate. You must submit at least 2 tasks to be eligible." },
    { q: "is there placement support", a: "Yes, CodeAlpha offers job opportunities and placement support to interns based on their performance during the internship program." },
    { q: "hello hi hey", a: "Hello! 👋 I'm the CodeAlpha FAQ Bot. Ask me anything about the internship program, tasks, submission, or certificates!" },
  ];

  function tokenize(text) {
    return text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(Boolean);
  }

  function cosineSimilarity(textA, textB) {
    const a = tokenize(textA);
    const b = tokenize(textB);
    const allWords = [...new Set([...a, ...b])];
    const vecA = allWords.map(w => a.filter(x => x === w).length);
    const vecB = allWords.map(w => b.filter(x => x === w).length);
    const dot = vecA.reduce((sum, v, i) => sum + v * vecB[i], 0);
    const magA = Math.sqrt(vecA.reduce((s, v) => s + v * v, 0));
    const magB = Math.sqrt(vecB.reduce((s, v) => s + v * v, 0));
    return magA && magB ? dot / (magA * magB) : 0;
  }

  function findBestMatch(input) {
    let best = null, bestScore = 0;
    for (const faq of faqs) {
      const score = cosineSimilarity(input, faq.q);
      if (score > bestScore) { bestScore = score; best = faq; }
    }
    return bestScore > 0.1 ? { faq: best, score: bestScore } : null;
  }

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, type, confidence = null) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${type}`;

    const avatarText = type === 'user' ? 'You' : '🤖';
    div.innerHTML = `
      <div class="msg-avatar">${avatarText}</div>
      <div>
        <div class="bubble">${text}</div>
        ${confidence !== null ? `<div class="confidence">Match confidence: ${Math.round(confidence * 100)}%</div>` : ''}
        <div class="timestamp">${getTime()}</div>
      </div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function sendMessage(text = null) {
    const input = document.getElementById('userInput');
    const msg = text || input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';

    showTyping();

    setTimeout(() => {
      removeTyping();
      const match = findBestMatch(msg);
      if (match) {
        addMessage(match.faq.a, 'bot', match.score);
      } else {
        addMessage("I'm not sure about that. Try asking about the internship tasks, submission, certificates, or contact info. You can also visit <strong>www.codealpha.tech</strong> for more details.", 'bot');
      }
    }, 800 + Math.random() * 500);
  }

  function askSuggestion(btn) {
    sendMessage(btn.textContent);
  }

  // Welcome message
  setTimeout(() => {
    addMessage("👋 Hi! I'm the <strong>CodeAlpha FAQ Bot</strong>. I can answer questions about the internship program, tasks, submission process, certificates, and more. What would you like to know?", 'bot');
  }, 400);
</script>
</body>
</html>
